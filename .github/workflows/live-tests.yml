name: Live Wiki Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "src/utils/**"
      - "tests/live/**"
      - "vitest.live.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/live-tests.yml"

permissions:
  contents: read

concurrency:
  group: live-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-tests:
    name: Live Integration Tests
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-live-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live parser tests
        run: pnpm test:live
