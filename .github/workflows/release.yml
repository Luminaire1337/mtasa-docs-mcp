name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package metadata
        id: metadata
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name")"
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches package version
        run: pnpm release:check-tag

      - name: Check npm registry for existing version
        id: npm-check
        run: |
          PACKAGE_NAME="${{ steps.metadata.outputs.package_name }}"
          VERSION="${{ steps.metadata.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already exists on npm. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is not on npm. Proceeding with release."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full verification pipeline
        if: steps.npm-check.outputs.should_publish == 'true'
        run: pnpm verify:full

      - name: Publish package to npm (trusted publishing)
        if: steps.npm-check.outputs.should_publish == 'true'
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Build release notes from changelog
        if: steps.npm-check.outputs.should_publish == 'true'
        run: pnpm release:notes

      - name: Create or update GitHub Release
        if: steps.npm-check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.md
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md --verify-tag
          fi

      - name: Wait for npm propagation
        if: steps.npm-check.outputs.should_publish == 'true'
        run: |
          PACKAGE_NAME="${{ steps.metadata.outputs.package_name }}"
          VERSION="${{ steps.metadata.outputs.version }}"
          for attempt in 1 2 3 4 5 6; do
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Published package is available on npm."
              exit 0
            fi
            echo "Package not yet visible (attempt ${attempt}/6), retrying in 10s..."
            sleep 10
          done

          echo "Published package did not become visible on npm in time."
          exit 1

      - name: Install published package
        if: steps.npm-check.outputs.should_publish == 'true'
        id: install-published
        run: |
          TEST_DIR="$(mktemp -d)"
          PACKAGE_NAME="${{ steps.metadata.outputs.package_name }}"
          VERSION="${{ steps.metadata.outputs.version }}"

          npm init -y --prefix "$TEST_DIR"
          npm install --prefix "$TEST_DIR" --no-save "${PACKAGE_NAME}@${VERSION}"

          echo "test_dir=$TEST_DIR" >> "$GITHUB_OUTPUT"

      - name: Smoke test published package
        if: steps.npm-check.outputs.should_publish == 'true'
        run: |
          PACKAGE_NAME="${{ steps.metadata.outputs.package_name }}"
          ENTRY_PATH="${{ steps.install-published.outputs.test_dir }}/node_modules/${PACKAGE_NAME}/build/index.js"
          node scripts/smoke.mjs --runtime=node "$ENTRY_PATH"

      - name: Install MCP publisher CLI
        if: steps.npm-check.outputs.should_publish == 'true'
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
          esac

          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" \
            | tar -xz mcp-publisher
          chmod +x ./mcp-publisher

      - name: Sync server manifest version
        if: steps.npm-check.outputs.should_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
        run: |
          node -e "const fs=require('node:fs');const manifestPath='server.json';const manifest=JSON.parse(fs.readFileSync(manifestPath,'utf8'));const version=process.env.RELEASE_VERSION;const packageName=process.env.RELEASE_PACKAGE_NAME;manifest.version=version;if(Array.isArray(manifest.packages)){manifest.packages=manifest.packages.map((pkg)=>pkg&&pkg.registryType==='npm'&&pkg.identifier===packageName?{...pkg,version}:pkg);}fs.writeFileSync(manifestPath,JSON.stringify(manifest,null,2)+'\\n');"

      - name: Authenticate to MCP Registry
        if: steps.npm-check.outputs.should_publish == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        if: steps.npm-check.outputs.should_publish == 'true'
        run: ./mcp-publisher publish ./server.json
