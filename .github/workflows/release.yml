name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan-release:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.metadata.outputs.package_name }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_publish: ${{ steps.npm-check.outputs.should_publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package metadata
        id: metadata
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name")"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        id: version
        run: |
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm registry for existing version
        id: npm-check
        run: |
          PACKAGE_NAME="${{ steps.metadata.outputs.package_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already exists on npm. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is not on npm. Proceeding with release."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  verify-release:
    name: Verify Release Candidate
    needs: plan-release
    if: needs.plan-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full verification pipeline
        run: pnpm verify:full

  publish-release:
    name: Publish npm + GitHub Release
    needs:
      - plan-release
      - verify-release
    if: needs.plan-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag matches package version
        env:
          GITHUB_REF_NAME: ${{ needs.plan-release.outputs.tag }}
        run: pnpm release:check-tag

      - name: Create and push release tag
        run: |
          TAG="${{ needs.plan-release.outputs.tag }}"

          if git ls-remote --tags origin "${TAG}" | grep "refs/tags/${TAG}$" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag ${TAG}."
          fi

      - name: Publish package to npm (trusted publishing)
        run: pnpm publish --access public --provenance

      - name: Build release notes from changelog
        run: pnpm release:notes

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.plan-release.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.md
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md --verify-tag
          fi

  verify-published-package:
    name: Verify Published Package
    needs:
      - plan-release
      - publish-release
    if: needs.plan-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for npm propagation
        run: |
          PACKAGE_NAME="${{ needs.plan-release.outputs.package_name }}"
          VERSION="${{ needs.plan-release.outputs.version }}"
          for attempt in 1 2 3 4 5 6; do
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Published package is available on npm."
              exit 0
            fi
            echo "Package not yet visible (attempt ${attempt}/6), retrying in 10s..."
            sleep 10
          done

          echo "Published package did not become visible on npm in time."
          exit 1

      - name: Install published package
        run: npm install --no-save "${{ needs.plan-release.outputs.package_name }}@${{ needs.plan-release.outputs.version }}"

      - name: Smoke test published package
        env:
          PACKAGE_NAME: ${{ needs.plan-release.outputs.package_name }}
        run: node scripts/smoke.mjs "./node_modules/${PACKAGE_NAME}/build/index.js"
